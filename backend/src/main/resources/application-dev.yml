# 开发环境配置
spring:
  datasource:
    url: jdbc:mysql://localhost:3306/calendar_dev?useSSL=false&serverTimezone=Asia/Shanghai&characterEncoding=utf8mb4
    username: calendar_dev
    password: dev_password_123
    driver-class-name: com.mysql.cj.jdbc.Driver
    
  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: true
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.MySQL8Dialect
        
  flyway:
    enabled: true
    baseline-on-migrate: true
    locations: classpath:db/migration
    
  redis:
    host: localhost
    port: 6379
    database: 0
    timeout: 5000ms
    lettuce:
      pool:
        max-active: 8
        max-idle: 8
        min-idle: 2

# JWT配置
jwt:
  secret: dev-secret-key-for-testing-only-minimum-256-bits-required
  expiration: 86400000 # 24小时
  refresh-expiration: 604800000 # 7天

# 日志配置
logging:
  level:
    com.calendar: DEBUG
    org.springframework.web: DEBUG
    org.hibernate.SQL: DEBUG
    
# 服务器配置
server:
  port: 8080
  servlet:
    context-path: /api
    
# WebSocket配置
websocket:
  allowed-origins: http://localhost:3000,http://10.0.2.2:8080
  
# Firebase配置（开发环境）
firebase:
  enabled: false # 开发环境禁用真实推送
  mock: true # 使用Mock推送
  
# 文件上传配置
spring.servlet.multipart:
  max-file-size: 10MB
  max-request-size: 10MB
  
# Actuator健康检查
management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics
  endpoint:
    health:
      show-details: always
