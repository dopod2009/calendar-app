name: Build Alpha APK

on:
  # 手动触发
  workflow_dispatch:
  
  # 推送到main或develop分支时触发
  push:
    branches: [ main, develop ]
    
  # Pull Request时触发
  pull_request:
    branches: [ main ]

jobs:
  build:
    name: Build Release APK
    runs-on: ubuntu-latest
    
    steps:
    # 1. 检出代码
    - name: Checkout Repository
      uses: actions/checkout@v4
      
    # 2. 设置JDK 17
    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'
        cache: gradle
        
    # 3. 设置Android SDK
    - name: Setup Android SDK
      uses: android-actions/setup-android@v3
      
    # 4. 授予Gradlew执行权限
    - name: Grant execute permission for gradlew
      run: chmod +x gradlew
      
    # 5. 创建签名密钥文件
    - name: Create keystore
      run: |
        mkdir -p keystore
        echo "${{ secrets.KEYSTORE_BASE64 }}" | base64 --decode > keystore/calendar-release.jks
      
    # 6. 创建keystore.properties
    - name: Create keystore.properties
      run: |
        cat > keystore/keystore.properties << EOF
        storePassword=${{ secrets.KEYSTORE_PASSWORD }}
        keyPassword=${{ secrets.KEY_PASSWORD }}
        keyAlias=${{ secrets.KEY_ALIAS }}
        storeFile=calendar-release.jks
        EOF
      
    # 7. 创建local.properties
    - name: Create local.properties
      run: |
        echo "sdk.dir=$ANDROID_HOME" > local.properties
      
    # 8. 构建Release APK
    - name: Build Release APK
      run: ./gradlew assembleRelease --stacktrace
      
    # 9. 签名APK（如果使用apksigner）
    - name: Sign APK
      if: success()
      run: |
        # APK已经通过Gradle配置自动签名，此步骤可选
        echo "APK signed successfully"
      
    # 10. 重命名APK文件
    - name: Rename APK
      run: |
        mv app/build/outputs/apk/release/app-release.apk \
           app/build/outputs/apk/release/calendar-app-v1.0.0-alpha.apk
      
    # 11. 上传APK作为构建产物
    - name: Upload APK as Artifact
      uses: actions/upload-artifact@v4
      with:
        name: calendar-alpha-apk
        path: app/build/outputs/apk/release/calendar-app-v1.0.0-alpha.apk
        retention-days: 30
        
    # 12. 生成构建报告
    - name: Generate Build Report
      if: always()
      run: |
        echo "## Build Report" >> $GITHUB_STEP_SUMMARY
        echo "" >> $GITHUB_STEP_SUMMARY
        echo "**Build Status:** ${{ job.status }}" >> $GITHUB_STEP_SUMMARY
        echo "" >> $GITHUB_STEP_SUMMARY
        echo "**APK Location:** \`app/build/outputs/apk/release/calendar-app-v1.0.0-alpha.apk\`" >> $GITHUB_STEP_SUMMARY
        echo "" >> $GITHUB_STEP_SUMMARY
        echo "**Build Time:** $(date '+%Y-%m-%d %H:%M:%S')" >> $GITHUB_STEP_SUMMARY

  # 可选：自动发布到GitHub Releases
  release:
    name: Create GitHub Release
    needs: build
    runs-on: ubuntu-latest
    if: github.event_name == 'workflow_dispatch'
    
    steps:
    - name: Checkout Repository
      uses: actions/checkout@v4
      
    - name: Download APK Artifact
      uses: actions/download-artifact@v4
      with:
        name: calendar-alpha-apk
        path: ./apk
        
    - name: Create GitHub Release
      uses: softprops/action-gh-release@v1
      with:
        tag_name: v1.0.0-alpha-${{ github.run_number }}
        name: Alpha Release v1.0.0 (Build ${{ github.run_number }})
        body: |
          ## 🎉 Alpha版本发布
          
          **版本号**: 1.0.0-alpha
          **构建号**: ${{ github.run_number }}
          **发布日期**: $(date '+%Y-%m-%d')
          
          ### ✨ 核心功能
          - 日历视图（月/周/日视图）
          - 事件管理（创建/编辑/删除）
          - 智能提醒（本地通知）
          - 数据同步（多设备同步）
          - Google日历集成
          
          ### 📝 更新日志
          详见 [CHANGELOG.md](./CHANGELOG.md)
          
          ### 📋 测试状态
          - 测试用例: 142个
          - 通过率: 96%
          - P0/P1缺陷: 0个
          
          ### ⚠️ 注意事项
          这是Alpha测试版本，仅用于功能验证，不建议用于生产环境。
        files: ./apk/calendar-app-v1.0.0-alpha.apk
        draft: false
        prerelease: true
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
